<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI בעולם הפרסום | 42 Creative</title>

  <!-- Reveal.js core CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
  <!-- Black base theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/black.css">
  <!-- Highlight.js for code blocks -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css">

  <!-- Google Fonts: Heebo (Hebrew-first) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <!-- Custom 42 theme -->
  <link rel="stylesheet" href="css/theme-42.css">
</head>
<body>
  <div class="reveal">
    <div class="slides">
      <section
        data-markdown="SLIDES.md"
        data-separator="^\n---\n"
        data-separator-vertical="^\n--\n"
        data-separator-notes="^Note:"
        data-charset="UTF-8">
      </section>
    </div>
  </div>

  <!-- Persistent 42 logo watermark -->
  <div class="logo-42" id="logo42">
    <img src="assets/logo-42.png" alt="42 Creative" onerror="this.parentElement.innerHTML='<span class=\'logo-text\'>42</span>'">
  </div>

  <!-- Reveal.js core -->
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>

  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>

  <!-- Our initialization -->
  <script src="js/init.js"></script>
</body>
</html>
